<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - RITMAX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../../assets/css/variables.css" rel="stylesheet">
  <link href="../../assets/css/main.css" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-brand-panel">
      <div class="auth-brand-content">
        <div class="auth-brand-logo"><i class="fas fa-lock"></i></div>
        <h1 class="mb-3">Create New Password</h1>
        <p class="opacity-75">Choose a strong password with at least 8 characters, including uppercase, lowercase, and numbers.</p>
      </div>
    </div>
    <div class="auth-form-panel">
      <div class="auth-form-container">
        <h2>Reset password</h2>
        <p class="auth-subtitle">Enter your new password below</p>
        <form data-validate novalidate action="login.html">
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <div class="input-group-icon">
              <i class="fas fa-lock"></i>
              <input type="password" class="form-control" required minlength="8" placeholder="Min. 8 characters" id="newPassword">
              <button type="button" class="password-toggle" aria-label="Toggle password"><i class="fas fa-eye"></i></button>
            </div>
            <div class="invalid-feedback">Password must be at least 8 characters.</div>
          </div>
          <div class="mb-4">
            <label class="form-label">Confirm Password</label>
            <div class="input-group-icon">
              <i class="fas fa-lock"></i>
              <input type="password" class="form-control" required placeholder="Confirm new password">
              <button type="button" class="password-toggle" aria-label="Toggle password"><i class="fas fa-eye"></i></button>
            </div>
            <div class="invalid-feedback">Passwords must match.</div>
          </div>
          <div class="mb-4">
            <div class="small text-muted mb-1">Password strength:</div>
            <div class="progress" style="height:4px"><div class="progress-bar bg-warning" style="width:60%"></div></div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 mb-3"><i class="fas fa-check me-2"></i>Reset Password</button>
        </form>
        <p class="text-center mb-0"><a href="login.html" class="text-decoration-none small"><i class="fas fa-arrow-left me-1"></i>Back to login</a></p>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/app.js"></script>
</body>
</html>
