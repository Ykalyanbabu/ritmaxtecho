<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - RITMAX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../../assets/css/variables.css" rel="stylesheet">
  <link href="../../assets/css/main.css" rel="stylesheet">
</head>
<body class="app-body" data-page="settings-company" data-base-path="../../" data-breadcrumbs='[{"label":"Home","href":"../../index.html"},{"label":"Account"},{"label":"Change Password"}]'>
  <div class="app-wrapper">
    <div id="sidebar-container"></div>
    <div class="app-main">
      <div id="header-container"></div>
      <div class="app-content">
        <div class="page-header"><h1 class="page-title">Change Password</h1><p class="page-subtitle">Update your account password for enhanced security.</p></div>
        <div class="row justify-content-center"><div class="col-lg-6">
          <div class="content-card">
            <div class="content-card-body">
              <form data-validate novalidate>
                <div class="mb-3">
                  <label class="form-label">Current Password</label>
                  <div class="input-group-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" required>
                    <button type="button" class="password-toggle"><i class="fas fa-eye"></i></button>
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label">New Password</label>
                  <div class="input-group-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" required minlength="8">
                    <button type="button" class="password-toggle"><i class="fas fa-eye"></i></button>
                  </div>
                  <div class="form-text">Minimum 8 characters with uppercase, lowercase, and number.</div>
                </div>
                <div class="mb-4">
                  <label class="form-label">Confirm New Password</label>
                  <div class="input-group-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" required>
                    <button type="button" class="password-toggle"><i class="fas fa-eye"></i></button>
                  </div>
                </div>
                <div class="alert alert-info small"><i class="fas fa-info-circle me-1"></i> You will be logged out of all other sessions after changing your password.</div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-key me-1"></i> Update Password</button>
              </form>
            </div>
          </div>
        </div></div>
      </div>
      <div id="footer-container"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/layout.js"></script>
  <script src="../../assets/js/app.js"></script>
</body>
</html>
