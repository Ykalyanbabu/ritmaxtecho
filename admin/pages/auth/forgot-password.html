<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - RITMAX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../../assets/css/variables.css" rel="stylesheet">
  <link href="../../assets/css/main.css" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-brand-panel">
      <div class="auth-brand-content">
        <div class="auth-brand-logo"><i class="fas fa-key"></i></div>
        <h1 class="mb-3">Reset Your Password</h1>
        <p class="opacity-75">We'll send you a secure link to reset your password. The link expires in 24 hours.</p>
      </div>
    </div>
    <div class="auth-form-panel">
      <div class="auth-form-container">
        <h2>Forgot password?</h2>
        <p class="auth-subtitle">Enter your email and we'll send reset instructions</p>
        <form data-validate novalidate>
          <div class="mb-4">
            <label class="form-label">Email Address</label>
            <div class="input-group-icon">
              <i class="fas fa-envelope"></i>
              <input type="email" class="form-control" required placeholder="you@payrollpro.in">
            </div>
            <div class="invalid-feedback">Please enter a valid email.</div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 mb-3"><i class="fas fa-paper-plane me-2"></i>Send Reset Link</button>
        </form>
        <p class="text-center mb-0"><a href="login.html" class="text-decoration-none small"><i class="fas fa-arrow-left me-1"></i>Back to login</a></p>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/app.js"></script>
</body>
</html>
