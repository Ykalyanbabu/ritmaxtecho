<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add/Edit Department - RITMAX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../../assets/css/variables.css" rel="stylesheet">
  <link href="../../assets/css/main.css" rel="stylesheet">
</head>
<body class="app-body" data-page="departments-form" data-base-path="../../" data-breadcrumbs='[{"label":"Home","href":"../../index.html"},{"label":"Departments","href":"index.html"},{"label":"Add Department"}]'>
  <div class="app-wrapper">
    <div id="sidebar-container"></div>
    <div class="app-main">
      <div id="header-container"></div>
      <div class="app-content">
        <div class="page-header"><h1 class="page-title">Add Department</h1><p class="page-subtitle">Create or update department information.</p></div>
        <div class="row justify-content-center"><div class="col-lg-8">
          <div class="content-card">
            <div class="content-card-body">
              <form data-validate novalidate>
                <div class="row g-3">
                  <div class="col-md-6"><label class="form-label">Department Name <span class="text-danger">*</span></label><input type="text" class="form-control" required placeholder="e.g. Engineering"></div>
                  <div class="col-md-6"><label class="form-label">Department Code</label><input type="text" class="form-control" placeholder="e.g. ENG"></div>
                  <div class="col-md-6"><label class="form-label">Department Head</label><select class="form-select"><option value="">Select head</option><option>Rajesh Kumar</option><option>Sneha Reddy</option></select></div>
                  <div class="col-md-6"><label class="form-label">Cost Center</label><input type="text" class="form-control" placeholder="CC-1001"></div>
                  <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" rows="3" placeholder="Department description..."></textarea></div>
                  <div class="col-md-6"><label class="form-label">Status</label><select class="form-select"><option>Active</option><option>Inactive</option></select></div>
                  <div class="col-12 d-flex gap-2 mt-2"><button type="submit" class="btn btn-primary"><i class="fas fa-check me-1"></i> Save Department</button><a href="index.html" class="btn btn-light-custom">Cancel</a></div>
                </div>
              </form>
            </div>
          </div>
        </div></div>
      </div>
      <div id="footer-container"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/layout.js"></script>
  <script src="../../assets/js/app.js"></script>
</body>
</html>
