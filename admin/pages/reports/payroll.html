<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payroll Reports - RITMAX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../../assets/css/variables.css" rel="stylesheet">
  <link href="../../assets/css/main.css" rel="stylesheet">
</head>
<body class="app-body" data-page="reports-payroll" data-base-path="../../" data-breadcrumbs='[{"label":"Home","href":"../../index.html"},{"label":"Reports"},{"label":"Payroll Reports"}]'>
  <div class="app-wrapper">
    <div id="sidebar-container"></div>
    <div class="app-main">
      <div id="header-container"></div>
      <div class="app-content">
        <div class="page-header d-flex flex-wrap justify-content-between gap-3">
          <div><h1 class="page-title">Payroll Reports</h1><p class="page-subtitle">Analyze payroll data and export reports.</p></div>
          <div class="d-flex gap-2"><button class="btn btn-outline-danger btn-sm"><i class="fas fa-file-pdf me-1"></i> PDF</button><button class="btn btn-outline-success btn-sm"><i class="fas fa-file-excel me-1"></i> Excel</button></div>
        </div>
        <div class="content-card mb-3"><div class="content-card-body"><div class="row g-3 align-items-end"><div class="col-md-3"><label class="form-label">Report Type</label><select class="form-select"><option>Payroll Summary</option><option>Department Wise</option><option>Employee Wise</option></select></div><div class="col-md-3"><label class="form-label">From</label><input type="date" class="form-control" value="2026-01-01"></div><div class="col-md-3"><label class="form-label">To</label><input type="date" class="form-control" value="2026-06-30"></div><div class="col-md-3"><button class="btn btn-primary w-100"><i class="fas fa-chart-bar me-1"></i> Generate</button></div></div></div></div>
        <div class="row g-3 mb-3"><div class="col-lg-8"><div class="content-card"><div class="content-card-header"><h5 class="content-card-title">Payroll Trend</h5></div><div class="content-card-body"><div class="chart-container"><canvas id="payrollTrendChart"></canvas></div></div></div></div><div class="col-lg-4"><div class="content-card h-100"><div class="content-card-header"><h5 class="content-card-title">Summary</h5></div><div class="content-card-body info-list"><div class="info-item"><span class="info-label">Total Gross</span><span class="info-value">₹23.82 Cr</span></div><div class="info-item"><span class="info-label">Total Deductions</span><span class="info-value">₹4.28 Cr</span></div><div class="info-item"><span class="info-label">Total Net</span><span class="info-value fw-bold">₹19.54 Cr</span></div></div></div></div></div>
        <div class="content-card" data-table><div class="content-card-body"><div class="table-responsive"><table class="data-table table"><thead><tr><th data-sort>Month <i class="fas fa-sort sort-icon"></i></th><th data-sort>Employees <i class="fas fa-sort sort-icon"></i></th><th data-sort>Gross <i class="fas fa-sort sort-icon"></i></th><th data-sort>Net <i class="fas fa-sort sort-icon"></i></th></tr></thead><tbody><tr><td>June 2026</td><td>248</td><td>₹42,53,350</td><td>₹34,86,930</td></tr><tr><td>May 2026</td><td>245</td><td>₹41,93,160</td><td>₹34,40,350</td></tr><tr><td>April 2026</td><td>242</td><td>₹41,40,040</td><td>₹33,96,360</td></tr></tbody></table></div></div></div>
      </div>
      <div id="footer-container"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="../../assets/js/layout.js"></script>
  <script src="../../assets/js/app.js"></script>
  <script src="../../assets/js/charts.js"></script>
  <script src="../../assets/js/tables.js"></script>
</body>
</html>
