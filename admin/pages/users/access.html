<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Control - RITMAX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../../assets/css/variables.css" rel="stylesheet">
  <link href="../../assets/css/main.css" rel="stylesheet">
</head>
<body class="app-body" data-page="users-access" data-base-path="../../" data-breadcrumbs='[{"label":"Home","href":"../../index.html"},{"label":"Users"},{"label":"Access Control"}]'>
  <div class="app-wrapper">
    <div id="sidebar-container"></div>
    <div class="app-main">
      <div id="header-container"></div>
      <div class="app-content">
        <div class="page-header"><h1 class="page-title">Access Control</h1><p class="page-subtitle">Manage IP restrictions, session policies, and security settings.</p></div>
        <div class="row g-3">
          <div class="col-lg-6"><div class="content-card"><div class="content-card-header"><h5 class="content-card-title">Session Policy</h5></div><div class="content-card-body"><div class="mb-3"><label class="form-label">Session Timeout (minutes)</label><input type="number" class="form-control" value="30"></div><div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" id="singleSession" checked><label class="form-check-label" for="singleSession">Single session per user</label></div><div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" id="forceLogout" checked><label class="form-check-label" for="forceLogout">Force logout on password change</label></div></div></div></div>
          <div class="col-lg-6"><div class="content-card"><div class="content-card-header"><h5 class="content-card-title">IP Whitelist</h5></div><div class="content-card-body"><div class="mb-3"><label class="form-label">Allowed IP Addresses</label><textarea class="form-control" rows="4" placeholder="192.168.1.0/24&#10;10.0.0.0/8"></textarea></div><div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="ipRestrict"><label class="form-check-label" for="ipRestrict">Enable IP restriction</label></div></div></div></div>
          <div class="col-12"><div class="content-card"><div class="content-card-header"><h5 class="content-card-title">Recent Login Activity</h5></div><div class="content-card-body"><table class="data-table table table-sm"><thead><tr><th>User</th><th>IP Address</th><th>Device</th><th>Time</th><th>Status</th></tr></thead><tbody><tr><td>Rajesh Kumar</td><td>103.45.67.89</td><td>Chrome / Windows</td><td>Today, 9:15 AM IST</td><td><span class="status-badge active">Success</span></td></tr><tr><td>Unknown</td><td>49.207.xx.xx</td><td>Firefox / Android</td><td>Yesterday, 11:42 PM IST</td><td><span class="status-badge inactive">Failed</span></td></tr></tbody></table></div></div></div>
        </div>
        <button class="btn btn-primary mt-3"><i class="fas fa-save me-1"></i> Save Access Settings</button>
      </div>
      <div id="footer-container"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/layout.js"></script>
  <script src="../../assets/js/app.js"></script>
</body>
</html>
