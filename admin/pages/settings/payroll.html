<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payroll Settings - RITMAX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../../assets/css/variables.css" rel="stylesheet">
  <link href="../../assets/css/main.css" rel="stylesheet">
</head>
<body class="app-body" data-page="settings-payroll" data-base-path="../../" data-breadcrumbs='[{"label":"Home","href":"../../index.html"},{"label":"Settings"},{"label":"Payroll Settings"}]'>
  <div class="app-wrapper">
    <div id="sidebar-container"></div>
    <div class="app-main">
      <div id="header-container"></div>
      <div class="app-content">
        <div class="page-header"><h1 class="page-title">Payroll Settings</h1><p class="page-subtitle">Configure pay cycles, currencies, and processing rules.</p></div>
        <div class="content-card"><div class="content-card-body"><form><div class="row g-3"><div class="col-md-6"><label class="form-label">Pay Frequency</label><select class="form-select"><option>Monthly</option><option>Bi-weekly</option><option>Weekly</option></select></div><div class="col-md-6"><label class="form-label">Currency</label><select class="form-select"><option selected>INR (₹)</option><option>USD ($)</option><option>EUR (€)</option></select></div><div class="col-md-6"><label class="form-label">Pay Day</label><select class="form-select"><option>Last day of month</option><option>15th of month</option><option>Custom</option></select></div><div class="col-md-6"><label class="form-label">Financial Year Start (India)</label><input type="date" class="form-control" value="2026-04-01"></div><div class="col-12"><h6 class="form-section-title">Processing Options</h6></div><div class="col-md-6"><div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="autoProcess" checked><label class="form-check-label" for="autoProcess">Auto-process recurring payroll</label></div></div><div class="col-md-6"><div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="overtime" checked><label class="form-check-label" for="overtime">Include overtime calculations</label></div></div><div class="col-md-6"><div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="proRata"><label class="form-check-label" for="proRata">Pro-rata for new joiners</label></div></div><div class="col-12"><button type="button" class="btn btn-primary"><i class="fas fa-save me-1"></i> Save Settings</button></div></div></form></div></div>
      </div>
      <div id="footer-container"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/layout.js"></script>
  <script src="../../assets/js/app.js"></script>
</body>
</html>
