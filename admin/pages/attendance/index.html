<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Dashboard - RITMAX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../../assets/css/variables.css" rel="stylesheet">
  <link href="../../assets/css/main.css" rel="stylesheet">
</head>
<body class="app-body" data-page="attendance-dashboard" data-base-path="../../" data-breadcrumbs='[{"label":"Home","href":"../../index.html"},{"label":"Attendance"},{"label":"Dashboard"}]'>
  <div class="app-wrapper">
    <div id="sidebar-container"></div>
    <div class="app-main">
      <div id="header-container"></div>
      <div class="app-content">
        <div class="page-header"><h1 class="page-title">Attendance Dashboard</h1><p class="page-subtitle">Real-time attendance overview for 11 June 2026 — Hyderabad office (IST).</p></div>
        <div class="row g-3 gap-section">
          <div class="col-sm-6 col-xl-3"><div class="stat-card"><div class="stat-card-icon success mb-3"><i class="fas fa-user-check"></i></div><div class="stat-card-value">215</div><div class="stat-card-label">Present Today</div></div></div>
          <div class="col-sm-6 col-xl-3"><div class="stat-card"><div class="stat-card-icon danger mb-3"><i class="fas fa-user-xmark"></i></div><div class="stat-card-value">8</div><div class="stat-card-label">Absent</div></div></div>
          <div class="col-sm-6 col-xl-3"><div class="stat-card"><div class="stat-card-icon warning mb-3"><i class="fas fa-umbrella-beach"></i></div><div class="stat-card-value">12</div><div class="stat-card-label">On Leave</div></div></div>
          <div class="col-sm-6 col-xl-3"><div class="stat-card"><div class="stat-card-icon primary mb-3"><i class="fas fa-house-laptop"></i></div><div class="stat-card-value">13</div><div class="stat-card-label">Remote</div></div></div>
        </div>
        <div class="row g-3">
          <div class="col-lg-8"><div class="content-card"><div class="content-card-header"><h5 class="content-card-title">Weekly Attendance Trend</h5></div><div class="content-card-body"><div class="chart-container"><canvas id="leaveChart"></canvas></div></div></div></div>
          <div class="col-lg-4"><div class="content-card"><div class="content-card-header"><h5 class="content-card-title">Today's Breakdown</h5></div><div class="content-card-body"><div class="chart-container"><canvas id="attendanceChart"></canvas></div></div></div></div>
        </div>
      </div>
      <div id="footer-container"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="../../assets/js/layout.js"></script>
  <script src="../../assets/js/app.js"></script>
  <script src="../../assets/js/charts.js"></script>
</body>
</html>
