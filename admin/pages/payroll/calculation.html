<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salary Calculation - RITMAX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../../assets/css/variables.css" rel="stylesheet">
  <link href="../../assets/css/main.css" rel="stylesheet">
</head>
<body class="app-body" data-page="payroll-calculation" data-base-path="../../" data-breadcrumbs='[{"label":"Home","href":"../../index.html"},{"label":"Payroll"},{"label":"Salary Calculation"}]'>
  <div class="app-wrapper">
    <div id="sidebar-container"></div>
    <div class="app-main">
      <div id="header-container"></div>
      <div class="app-content">
        <div class="page-header">
          <h1 class="page-title">Salary Calculation</h1>
          <p class="page-subtitle">Calculate salary components, allowances, and deductions.</p>
        </div>
        <div class="row g-3">
          <div class="col-lg-5">
            <div class="content-card">
              <div class="content-card-header"><h5 class="content-card-title">Calculation Input</h5></div>
              <div class="content-card-body">
                <div class="mb-3"><label class="form-label">Employee</label><select class="form-select"><option>Priya Sharma (EMP-001)</option><option>Rahul Reddy (EMP-002)</option></select></div>
                <div class="mb-3"><label class="form-label">Base Salary</label><div class="input-group"><span class="input-group-text">₹</span><input type="number" class="form-control" value="85000"></div></div>
                <h6 class="form-section-title mt-4">Earnings</h6>
                <div class="row g-2 mb-2"><div class="col-7"><label class="form-label small">Housing Allowance</label></div><div class="col-5"><input type="number" class="form-control form-control-sm" value="5000"></div></div>
                <div class="row g-2 mb-2"><div class="col-7"><label class="form-label small">Transport Allowance</label></div><div class="col-5"><input type="number" class="form-control form-control-sm" value="2000"></div></div>
                <div class="row g-2 mb-3"><div class="col-7"><label class="form-label small">Performance Bonus</label></div><div class="col-5"><input type="number" class="form-control form-control-sm" value="10000"></div></div>
                <h6 class="form-section-title">Deductions</h6>
                <div class="row g-2 mb-2"><div class="col-7"><label class="form-label small">Income Tax (TDS)</label></div><div class="col-5"><input type="number" class="form-control form-control-sm" value="8500"></div></div>
                <div class="row g-2 mb-2"><div class="col-7"><label class="form-label small">Provident Fund (PF)</label></div><div class="col-5"><input type="number" class="form-control form-control-sm" value="5270"></div></div>
                <div class="row g-2 mb-3"><div class="col-7"><label class="form-label small">ESI / Insurance</label></div><div class="col-5"><input type="number" class="form-control form-control-sm" value="1530"></div></div>
                <button class="btn btn-primary w-100"><i class="fas fa-calculator me-1"></i> Calculate</button>
              </div>
            </div>
          </div>
          <div class="col-lg-7">
            <div class="content-card">
              <div class="content-card-header"><h5 class="content-card-title">Calculation Result</h5></div>
              <div class="content-card-body">
                <div class="info-list mb-4">
                  <div class="info-item"><span class="info-label">Base Salary</span><span class="info-value">₹85,000.00</span></div>
                  <div class="info-item"><span class="info-label">Total Earnings</span><span class="info-value text-success">+₹17,000.00</span></div>
                  <div class="info-item"><span class="info-label">Gross Salary</span><span class="info-value fw-bold">₹1,02,000.00</span></div>
                  <div class="info-item"><span class="info-label">Total Deductions</span><span class="info-value text-danger">-₹15,300.00</span></div>
                  <div class="info-item"><span class="info-label">Net Salary</span><span class="info-value fw-bold text-primary" style="font-size:1.25rem">₹86,700.00</span></div>
                </div>
                <div class="chart-container-sm"><canvas id="payrollTrendChart"></canvas></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="footer-container"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="../../assets/js/layout.js"></script>
  <script src="../../assets/js/app.js"></script>
  <script src="../../assets/js/charts.js"></script>
</body>
</html>
