<!-- RITMAX - Header Component Reference -->
<!-- Injected by layout.js. Configure breadcrumbs via data-breadcrumbs on <body> -->

<header class="app-header">
  <button class="header-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
  <div class="header-search">
    <i class="fas fa-search"></i>
    <input type="search" placeholder="Search employees, payroll, reports..." id="globalSearch">
  </div>
  <div class="header-actions">
    <button class="header-action-btn" id="notificationBtn"><i class="fas fa-bell"></i></button>
    <!-- User profile dropdown -->
  </div>
</header>
